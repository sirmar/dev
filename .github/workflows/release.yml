name: Release

on:
  push:
    tags: ['v*']

jobs:
  push:
    name: Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Install dev
        run: |
          cp src/app/dev.sh /usr/local/bin/dev
          chmod +x /usr/local/bin/dev
      - name: Push
        run: dev push

  push-image:
    name: Push ${{ matrix.image }} Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image: [bash, nginx, python, typescript]
    steps:
      - uses: actions/checkout@v4
      - uses: ./
      - name: Login
        run: dev login
      - name: Push
        working-directory: images/${{ matrix.image }}
        run: dev push
