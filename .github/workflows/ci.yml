name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_DEFAULT_PLATFORM: linux/amd64

jobs:
  tool:
    name: Tool / ${{ matrix.job }}
    runs-on: ubuntu-latest
    permissions:
      packages: read
      pull-requests: write
    strategy:
      matrix:
        job: [lint-dockerfile, lint, coverage]
    steps:
      - uses: actions/checkout@v4
      - uses: ./
      - name: Login
        run: dev login
      - name: Run
        run: dev ${{ matrix.job }}
      - name: Coverage summary
        if: matrix.job == 'coverage'
        run: |
          rate=$(grep -o 'line-rate="[^"]*"' coverage/cobertura.xml | head -1 | grep -o '[0-9.]*')
          pct=$(echo "$rate * 100" | bc -l | xargs printf "%.1f")
          echo "### Coverage: ${pct}%" >> "$GITHUB_STEP_SUMMARY"

  image:
    name: ${{ matrix.image }} / ${{ matrix.job }}
    runs-on: ubuntu-latest
    permissions:
      packages: read
    strategy:
      matrix:
        image: [bash, nginx, python, typescript]
        job: [lint-dockerfile, build]
    steps:
      - uses: actions/checkout@v4
      - uses: ./
      - name: Login
        run: dev login
      - name: Run
        working-directory: images/${{ matrix.image }}
        run: dev ${{ matrix.job }}
