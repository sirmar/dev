name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GITHUB_ACTOR: ${{ github.actor }}
  DOCKER_DEFAULT_PLATFORM: linux/amd64

jobs:
  tool:
    name: Tool
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4
      - name: Install dev
        run: |
          cp app/dev.sh /usr/local/bin/dev
          chmod +x /usr/local/bin/dev
      - name: Login
        run: dev login
      - name: Lint
        run: dev lint
      - name: Unit tests
        run: dev unit
      - name: Coverage
        run: dev coverage

  bash-image:
    name: Bash Image
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4
      - name: Install dev
        run: |
          cp app/dev.sh /usr/local/bin/dev
          chmod +x /usr/local/bin/dev
      - name: Login
        run: dev login
      - name: Lint
        working-directory: images/bash
        run: dev lint
      - name: Build
        working-directory: images/bash
        run: dev build

  python-image:
    name: Python Image
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4
      - name: Install dev
        run: |
          cp app/dev.sh /usr/local/bin/dev
          chmod +x /usr/local/bin/dev
      - name: Login
        run: dev login
      - name: Lint
        working-directory: images/python
        run: dev lint
      - name: Build
        working-directory: images/python
        run: dev build
