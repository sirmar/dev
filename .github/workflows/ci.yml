name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GITHUB_ACTOR: ${{ github.actor }}
  DOCKER_DEFAULT_PLATFORM: linux/amd64

jobs:
  tool:
    name: Tool
    runs-on: ubuntu-latest
    permissions:
      packages: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./
      - name: Login
        run: dev login
      - name: Lint
        run: dev lint
      - name: Coverage
        run: dev coverage
      - name: Coverage summary
        run: |
          rate=$(grep -o 'line-rate="[^"]*"' coverage/cobertura.xml | head -1 | grep -o '[0-9.]*')
          pct=$(echo "$rate * 100" | bc -l | xargs printf "%.1f")
          echo "### Coverage: ${pct}%" >> "$GITHUB_STEP_SUMMARY"

  bash-image:
    name: Bash Image
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./
      - name: Login
        run: dev login
      - name: Lint
        working-directory: images/bash
        run: dev lint
      - name: Build
        working-directory: images/bash
        run: dev build

  nginx-image:
    name: Nginx Image
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./
      - name: Login
        run: dev login
      - name: Lint
        working-directory: images/nginx
        run: dev lint
      - name: Build
        working-directory: images/nginx
        run: dev build

  python-image:
    name: Python Image
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./
      - name: Login
        run: dev login
      - name: Lint
        working-directory: images/python
        run: dev lint
      - name: Build
        working-directory: images/python
        run: dev build

  typescript-image:
    name: TypeScript Image
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./
      - name: Login
        run: dev login
      - name: Lint
        working-directory: images/typescript
        run: dev lint
      - name: Build
        working-directory: images/typescript
        run: dev build
