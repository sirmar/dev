name: Setup dev
description: Install the dev CLI into the runner's PATH

runs:
  using: composite
  steps:
    - name: Install dev
      shell: bash
      run: |
        cp "${{ github.action_path }}/src/app/dev.sh" /usr/local/bin/dev
        cp "${{ github.action_path }}/src/app/docker-compose.network.yml" /usr/local/bin/docker-compose.network.yml
        cp "${{ github.action_path }}/src/app/docker-compose.e2e-network.yml" /usr/local/bin/docker-compose.e2e-network.yml
        chmod +x /usr/local/bin/dev
